image: python:3.11-slim

stages:
  - validate

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

validate:
  stage: validate
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m py_compile app.py
    - python -m py_compile models.py
    - python -m py_compile startup_crawler_global.py
    - python -m py_compile data_hyper_scale.py
    - python -m py_compile data_vcs_massive.py
    - python -c "from app import app; print('✅ Flask app imports OK')"
    - echo "✅ All modules compiled and validated — pipeline PASS."
