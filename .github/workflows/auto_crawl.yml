name: Auto Crawl & Health Check

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate all modules compile
        run: |
          python -m py_compile app.py
          python -m py_compile models.py
          python -m py_compile startup_crawler_global.py
          python -m py_compile data_hyper_scale.py
          python -m py_compile data_vcs_massive.py
          echo "✅ All modules validated."

      - name: Health Check - Live Site
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://global-startup-explorerglobal-startup.onrender.com/ || echo "000")
          echo "Live site HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Live site is healthy."
          else
            echo "⚠️ Live site returned $HTTP_CODE (may be cold-booting on free tier)."
          fi
