name: Auto Crawl & Health Check

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate all modules compile
        run: |
          python -m py_compile app.py
          python -m py_compile models.py
          python -m py_compile startup_crawler_global.py
          python -m py_compile data_hyper_scale.py
          python -m py_compile data_vcs_massive.py
          python -c "from app import app; print('✅ Flask app imports OK')"

      - name: Health Check - Live Site
        run: |
          HEALTH=$(curl -s https://global-startup-explorerglobal-startup.onrender.com/api/health || echo '{}')
          echo "Health response: $HEALTH"
          STATUS=$(echo "$HEALTH" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
          RECORDS=$(echo "$HEALTH" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('records',0))" 2>/dev/null || echo "0")
          VERSION=$(echo "$HEALTH" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','?'))" 2>/dev/null || echo "?")
          echo "Status: $STATUS | Records: $RECORDS | Version: $VERSION"
          if [ "$STATUS" = "ok" ]; then
            echo "✅ Live site is healthy. v$VERSION with $RECORDS records."
          else
            echo "⚠️ Site status: $STATUS (may be cold-booting on free tier)."
          fi
